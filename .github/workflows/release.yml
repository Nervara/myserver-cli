# Release pipeline:
#   1. Triggered by pushing a `v*` tag (e.g. `v0.1.117`).
#   2. Goreleaser builds binary archives for the GitHub Release.
#   3. We publish the single top-level @serverops/myserver-cli package.
#
# Secrets required (configured in repo settings):
#   - GITHUB_TOKEN: provided by Actions, used by goreleaser
#   - NPM_TOKEN:    npm automation token with publish access to @serverops

name: release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (without leading v). Used only for manual reruns."
        required: false

permissions:
  contents: write # goreleaser uploads to the Release
  # `npm publish --provenance` needs an OIDC token so the npm registry can
  # verify the publish came from this exact workflow + commit. Without
  # this the publish step would fail with "must have id-token: write".
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # goreleaser needs full history for changelog

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Goreleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve version
        id: ver
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "value=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload raw npm binaries
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.ver.outputs.value }}
        run: |
          set -euo pipefail
          mkdir -p dist/raw
          for target in darwin/amd64 darwin/arm64 linux/amd64 linux/arm64 windows/amd64 windows/arm64; do
            os="${target%/*}"
            arch="${target#*/}"
            ext=""
            if [ "$os" = "windows" ]; then ext=".exe"; fi
            out="dist/raw/myserver-${os}-${arch}${ext}"
            echo "building ${out}"
            CGO_ENABLED=0 GOOS="$os" GOARCH="$arch" go build \
              -trimpath \
              -ldflags="-s -w -X main.cliVersion=${VERSION}" \
              -o "$out" ./cmd/myserver
          done
          (cd dist/raw && for f in myserver-*; do sha256sum "$f" > "$f.sha256"; done)
          gh release upload "v${VERSION}" dist/raw/myserver-* --clobber

      - name: Sync top-level package version
        run: |
          node -e '
            const fs = require("node:fs");
            const v = process.env.VERSION;
            const p = JSON.parse(fs.readFileSync("package.json", "utf8"));
            p.version = v;
            fs.writeFileSync("package.json", JSON.stringify(p, null, 2) + "\n");
          '
        env:
          VERSION: ${{ steps.ver.outputs.value }}

      - name: Publish top-level package
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public --provenance
