name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache: true

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test ./... -count=1 -timeout=120s

      # Build into runner.temp so the path works on Linux, macOS, AND
      # Windows; `/tmp` doesn't exist on Windows runners, and stripping
      # the smoke run there meant we never actually validated a runnable
      # Windows binary.
      - name: go build (linux/macOS)
        if: runner.os != 'Windows'
        run: go build -trimpath -o "${{ runner.temp }}/myserver" ./cmd/myserver

      - name: smoke run (linux/macOS)
        if: runner.os != 'Windows'
        run: "${{ runner.temp }}/myserver version"

      - name: go build (Windows)
        if: runner.os == 'Windows'
        run: go build -trimpath -o "${{ runner.temp }}/myserver.exe" ./cmd/myserver

      - name: smoke run (Windows)
        if: runner.os == 'Windows'
        run: '& "${{ runner.temp }}/myserver.exe" version'
